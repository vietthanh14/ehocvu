<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #fdfdfd;
        }

        .table-container {
            max-height: 280px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 6px;
        }

        thead th {
            position: sticky;
            top: 0;
            background: #e9ecef;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="container-fluid px-1">
        <h4 class="mb-3 text-primary fw-bold text-center text-uppercase border-bottom pb-2">📜 Tạo Quyết Định</h4>
        
        <div class="row mx-0">
            <!-- CỘT TRÁI: CÁC TRƯỜNG NHẬP LIỆU -->
            <div class="col-md-4 px-1">
                <!-- CHỌN LOẠI QUYẾT ĐỊNH -->
                <div class="bg-white p-3 rounded border shadow-sm mb-3">
                    <label class="form-label fw-bold text-secondary">Loại Quyết Định</label>
                    <select id="decisionType" class="form-select border-primary fw-bold text-primary" onchange="loadStudents()">
                        <option value="" selected disabled>👉 Hãy chọn loại quyết định</option>
                        <option value="baoluu">📚 Quyết định Bảo lưu kết quả học tập</option>
                        <option value="tieptuchoc">🎓 Quyết định Tiếp tục học sau bảo lưu</option>
                    </select>
                </div>

                <!-- SỐ VÀ NGÀY QUYẾT ĐỊNH -->
                <div class="row bg-white p-3 rounded border shadow-sm mb-3 mx-0">
                    <div class="col-6 ps-0 pe-2">
                        <label class="form-label fw-bold text-secondary">Số Quyết Định</label>
                        <input type="text" id="soQD" class="form-control" placeholder="VD: 115">
                    </div>
                    <div class="col-6 pe-0 ps-2">
                        <label class="form-label fw-bold text-secondary">Ngày ban hành</label>
                        <input type="date" id="ngayQD" class="form-control">
                    </div>
                </div>

                <!-- HỌC KÌ VÀ NĂM HỌC -->
                <div id="tiepTucHocFields" class="row bg-white p-3 rounded border shadow-sm mb-3 mx-0" style="display: none;">
                    <div class="col-6 ps-0 pe-2">
                        <label class="form-label fw-bold text-secondary">Từ Học kì</label>
                        <input type="text" id="hocKi" class="form-control" placeholder="VD: 2">
                    </div>
                    <div class="col-6 pe-0 ps-2">
                        <label class="form-label fw-bold text-secondary">Năm học</label>
                        <input type="text" id="namHoc" class="form-control" placeholder="VD: 2023 - 2024">
                    </div>
                </div>

                <button id="btnGenerate" class="btn btn-success w-100 fw-bold py-3 shadow-sm mb-3 text-uppercase fs-5" onclick="generateDocs()" disabled>
                    🖨️ Xuất file Quyết định
                </button>
                
                <div id="result" class="text-center mt-2"></div>
            </div>

            <!-- CỘT PHẢI: BẢNG DANH SÁCH SINH VIÊN -->
            <div class="col-md-8 px-1">
                <div class="bg-white p-3 rounded border shadow-sm h-100">
                    <div id="loading" class="text-center my-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2 text-muted fw-bold" id="loadingText">Đang tải danh sách từ Google Sheets...</p>
                    </div>

                    <div id="content" style="display:none;">
                        <div class="d-flex justify-content-between align-items-center mb-2 px-1 border-bottom pb-2">
                            <div>
                                <input type="checkbox" id="selectAll" class="form-check-input" onchange="toggleSelectAll()">
                                <label for="selectAll" class="form-check-label ms-1 fw-bold text-primary">Chọn tất cả</label>
                            </div>
                            <span class="badge bg-primary px-3 py-2 fs-6" id="countBadge">Đã chọn: 0</span>
                        </div>

                        <div class="table-container shadow-sm mt-2" style="max-height: 480px;">
                            <table class="table table-hover table-bordered mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th width="40" class="text-center">#</th>
                                        <th>Mã SV</th>
                                        <th>Họ và tên</th>
                                        <th>Ngày sinh</th>
                                        <th>Lớp</th>
                                    </tr>
                                </thead>
                                <tbody id="studentTableBody">
                                    <!-- Danh sách sinh viên sẽ tự chèn vào đây -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var globalStudents = [];
        var currentLoadId = 0;

        // Chống reload trang khi bấm Enter trong ô input
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
            }
        });

        // Gọi load dữ liệu lần đầu tiên
        window.onload = function() {
            loadStudents();
        };

        function loadStudents() {
            // Lấy ID loại quyết định đang được chọn
            var selectedType = document.getElementById('decisionType').value;
            
            // Nếu chưa chọn loại Quyết định nào thì không làm gì cả
            if (!selectedType) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'none';
                return;
            }

            // Tạo 1 ID riêng cho lần tải này để chống lỗi Race Condition (tải đè)
            currentLoadId++;
            var myLoadId = currentLoadId;
            
            // Hiển thị/ẩn ô nhập Học kì và Năm học dựa theo loại quyết định
            var tiepTucHocFields = document.getElementById('tiepTucHocFields');
            if (selectedType === 'tieptuchoc') {
                tiepTucHocFields.style.display = 'flex';
            } else {
                tiepTucHocFields.style.display = 'none';
            }
            
            // Cập nhật giao diện đang loading
            document.getElementById('content').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loadingText').innerText = 'Đang lọc danh sách ' + (selectedType === 'baoluu' ? 'Bảo lưu' : 'Tiếp tục học') + '...';
            document.getElementById('result').innerHTML = '';
            document.getElementById('selectAll').checked = false;

            // Gọi hàm getPendingStudents(typeId) trên server
            google.script.run.withSuccessHandler(function (data) {
                // Nếu người dùng đã bấm chọn cái khác rồi thì bỏ qua kết quả cũ này
                if (myLoadId !== currentLoadId) return; 
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                globalStudents = data;
                renderTable();
            }).getPendingStudents(selectedType);
        }

        function renderTable() {
            var tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = '';
            var selectedType = document.getElementById('decisionType').value;

            if (globalStudents.length === 0) {
                var message = selectedType === 'baoluu' 
                    ? 'Không có sinh viên nào đang chờ duyệt BẢO LƯU!' 
                    : 'Không có sinh viên nào đang chờ duyệt TIẾP TỤC HỌC!';
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger fw-bold py-4">' + message + '</td></tr>';
                updateCount(); // Reset lại nút bấm
                return;
            }

            var html = '';
            for (var i = 0; i < globalStudents.length; i++) {
                var s = globalStudents[i];
                html += '<tr>';
                html += '<td class="text-center"><input type="checkbox" class="form-check-input student-checkbox" value="' + i + '" onchange="updateCount()"></td>';
                html += '<td>' + s.maSV + '</td>';
                html += '<td>' + s.hoTen + '</td>';
                html += '<td>' + s.ngaySinh + '</td>';
                html += '<td>' + s.lop + '</td>';
                html += '</tr>';
            }
            tbody.innerHTML = html;
            updateCount(); // Reset lại nút bấm
        }

        function toggleSelectAll() {
            var isChecked = document.getElementById('selectAll').checked;
            var checkboxes = document.querySelectorAll('.student-checkbox');
            for (var i = 0; i < checkboxes.length; i++) {
                checkboxes[i].checked = isChecked;
            }
            updateCount();
        }

        function updateCount() {
            var checkboxes = document.querySelectorAll('.student-checkbox:checked');
            var count = checkboxes.length;
            document.getElementById('countBadge').innerText = 'Đã chọn: ' + count;
            document.getElementById('btnGenerate').disabled = (count === 0);
        }

        function generateDocs() {
            var soQD = document.getElementById('soQD').value;
            var ngayQD = document.getElementById('ngayQD').value;
            var selectedType = document.getElementById('decisionType').value;
            
            var hocKi = document.getElementById('hocKi').value;
            var namHoc = document.getElementById('namHoc').value;

            var checkboxes = document.querySelectorAll('.student-checkbox:checked');
            var selected = [];
            for (var i = 0; i < checkboxes.length; i++) {
                var index = checkboxes[i].value;
                selected.push(globalStudents[index]);
            }

            var btn = document.getElementById('btnGenerate');
            var resDiv = document.getElementById('result');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang xử lý tạo file, vui lòng đợi...';
            resDiv.innerHTML = '';

            // Truyền 6 tham số: danh sách sinh viên, Số QĐ, Ngày QĐ, Loại QĐ, Học kì, Năm học
            google.script.run
                .withSuccessHandler(function (response) {
                    btn.disabled = false;
                    btn.innerHTML = '🖨️ XUẤT FILE QUYẾT ĐỊNH (.DOCX)';
                    if (response.success) {
                        resDiv.innerHTML = '<div class="alert alert-success fs-5">✅ Đã tạo file thành công! <br><a href="' + response.url + '" target="_blank" class="fw-bold">👉 BẤM VÀO ĐÂY ĐỂ TẢI XUỐNG</a></div>';
                    } else {
                        resDiv.innerHTML = '<div class="alert alert-danger">❌ Lỗi: ' + response.message + '</div>';
                    }
                })
                .generateDecisionDocs(selected, soQD, ngayQD, selectedType, hocKi, namHoc);
        }
    </script>
</body>

</html>
